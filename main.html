<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	 <div class="container">
        <h2>User SignUp Form..!</h2>
        <form action="Post">
            <label for="name">Enter Name:</label>
            <input type="text" id="name" required="yes" placeholder="Name">
            <br><br>
            <label for="email">Enter Email:</label>
            <input type="text" id="email" required="yes" placeholder="Email">
            <br>
            <br>
            <label>Gender :</label>
            <div>
                <input type="radio" id="gender_m" name="gender" value="male" required>
                <label for="gender_male">Male</label>
                <br>
                <input type="radio" id="gender_f" name="gender" value="female">
                <label for="gender_female">Female</label>
                <br>
                <input type="radio" id="gender_other" name="gender" value="other">
                <label for="gender_other">Other</label>
                <br> <br>
            </div>

            <label for="car_brands">Select Car Brands :</label>
            <br>
            <select name="car_brands" id="cars" multiple size="6" required="yes" >
                <option value="" disabled selected>Choose an option</option>
                <option value="toyota">Toyota</option>
                <option value="honda">Honda</option>
                <option value="ford">Ford</option>
                <option value="bmw">BMW</option>
                <option value="mercedes">Mercedes</option>
                <option value="tesla">Tesla</option>
                <option value="audi">Audi</option>
            </select>
            <br>
            <br>

            <label for="age">Enter Age:
                <input type="number" id="age" required="yes" placeholder="Age">
            </label>
            <br><br>

            <label for="DBO">Date Of Birth:</label>
            <input type="date" id="DBO" required="yes">
            <br><br>

            <label for="phoneNNumber">Phone Number:</label>
            <input type="tel" id="phoneNNumber" required="yes" placeholder="xxx-xxx-xxxx">
            <br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" required="yes" placeholder="Password">
            <br><br>

            <label for="i agree">I Agree to the TOS:</label>
            <input type="radio" required="yes" id="tos" >
            <br><br>

            <input 
        type="submit" 
        id="submit" 
        value="Submit"
      />
        </form>
    </div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
